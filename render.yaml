services:
  - type: web
    name: parakletos-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: postgresql://parakletos_admin:Nzz1JiaREieDsJnB0uydsZWv2zry4I1i@dpg-d75q7gk50q8c73b68620-a.virginia-postgres.render.com/archive_db_djej
        fromDatabase:
          name: parakletos-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://parakletos-frontend.onrender.com

  - type: web
    name: parakletos-frontend
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

databases:
  - name: parakletos-db
